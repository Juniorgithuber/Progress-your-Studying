name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Rename APK for release
        run: cp app/build/outputs/apk/debug/app-debug.apk study-tracker.apk

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "آخرین نسخه"
          body: "این نسخه به‌صورت خودکار توسط GitHub Actions از روی کد این ریپو ساخته شده. فایل study-tracker.apk رو دانلود و روی گوشی نصب کن."
          files: study-tracker.apk
          prerelease: true
